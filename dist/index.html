<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Incremental Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="start-menu" class="overlay">
        <div class="start-content">
            <h1 class="dream-title">THE INCREMENTAL GAME</h1>
            <div class="patchnotes">
                <h2>Patch Notes</h2>
                <ul>
                    <li>v0.0.2 - Added start menu and button</li>
                    <li>v0.0.1 - Initial release: 3D scene and incremental logic</li>
                </ul>
            </div>
            <div class="version">Version: <span id="game-version">0.0.2</span></div>
            <button id="start-btn" class="start-btn">Start</button>
        </div>
    </div>
    <div id="main-content" style="display:none;">
        <h1>The Incremental Game</h1>
        <div id="game-container"></div>
        <div id="ui">
            <p>Points: <span id="points">0</span></p>
            <button id="increment-btn">Increment</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
